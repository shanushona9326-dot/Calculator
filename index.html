<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Pro Max</title>
    <style>
        :root { --orange: #ff9f0a; --dark-grey: #1c1c1e; --black: #000; }
        body { background-color: var(--black); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* Sidebar Navigation */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 100; top: 0; left: 0; background-color: #111; overflow-x: hidden; transition: 0.5s; padding-top: 60px; border-right: 1px solid #333; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: #888; display: block; transition: 0.3s; cursor: pointer; }
        .sidebar a:hover { color: var(--orange); background: #222; }
        .sidebar .closebtn { position: absolute; top: 0; right: 25px; font-size: 36px; }

        /* Main Pro Max Container */
        .pro-container { width: 95%; max-width: 400px; background: var(--dark-grey); padding: 20px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative; }
        
        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .menu-btn { background: none; border: none; color: var(--orange); font-size: 28px; cursor: pointer; padding: 10px; }
        h1 { font-size: 16px; letter-spacing: 3px; color: #555; margin: 0; text-transform: uppercase; }

        /* Display Area */
        #display-main { width: 100%; background: none; border: none; color: white; font-size: 60px; text-align: right; padding: 20px 10px; outline: none; margin-bottom: 10px; font-weight: 300; }

        /* Conversion Boxes */
        .tool-box { display: none; flex-direction: column; gap: 12px; animation: slideUp 0.3s ease; padding: 10px; }
        .active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input.tool-input, select.tool-select { background: #2c2c2e; border: 1px solid #3a3a3c; color: white; padding: 15px; border-radius: 15px; font-size: 18px; width: 100%; box-sizing: border-box; outline: none; }
        input.tool-input:focus { border-color: var(--orange); }

        .res-pill { background: rgba(255, 159, 10, 0.15); border: 1px solid var(--orange); padding: 15px; border-radius: 20px; text-align: center; color: var(--orange); font-size: 18px; font-weight: bold; margin-top: 10px; }

        /* Original Style Buttons (Placeholder for Layout) */
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn { background: #333; border-radius: 50%; height: 75px; width: 75px; border: none; color: white; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .btn:active { background: #555; }
        .btn-orange { background: var(--orange); }
        .btn-grey { background: #a5a5a5; color: black; }
    </style>
</head>
<body>

<div id="proSidebar" class="sidebar">
    <a class="closebtn" onclick="toggleMenu()">&times;</a>
    <p style="color:#444; font-size:12px; padding-left:25px; letter-spacing:2px;">ENGINE MODES</p>
    <a onclick="switchTool('calc')">STANDARD CALC</a>
    <a onclick="switchTool('curr')">LIVE CURRENCY</a>
    <a onclick="switchTool('mass')">MASS CONVERTER</a>
    <a onclick="switchTool('speed')">SPEED & DISTANCE</a>
</div>

<div class="pro-container">
    <div class="header-row">
        <button class="menu-btn" onclick="toggleMenu()">&#9776;</button>
        <h1 id="mode-title">PRO MAX</h1>
        <div style="width:40px;"></div>
    </div>

    <div id="calc-tool" class="tool-box active">
        <input type="text" id="display-main" value="0" readonly>
        <div class="btn-grid">
            <button class="btn btn-grey">AC</button>
            <button class="btn btn-grey">+/-</button>
            <button class="btn btn-grey">%</button>
            <button class="btn btn-orange">÷</button>
            <button class="btn">7</button><button class="btn">8</button><button class="btn">9</button>
            <button class="btn btn-orange">×</button>
        </div>
    </div>

    <div id="curr-tool" class="tool-box">
        <input type="number" id="c-amt" class="tool-input" placeholder="Enter Amount" oninput="doCurr()">
        <select id="c-from" class="tool-select" onchange="doCurr()">
            <option value="USD">USD ($)</option>
            <option value="INR" selected>INR (₹)</option>
        </select>
        <select id="c-to" class="tool-select" onchange="doCurr()">
            <option value="USD" selected>USD ($)</option>
            <option value="INR">INR (₹)</option>
        </select>
        <div id="c-res" class="res-pill">Ready to Convert</div>
    </div>

    <div id="mass-tool" class="tool-box">
        <input type="number" id="m-val" class="tool-input" placeholder="Weight Value" oninput="doMass()">
        <select id="m-unit" class="tool-select" onchange="doMass()">
            <option value="kg">Kilograms</option>
            <option value="lb">Pounds</option>
        </select>
        <div id="m-res" class="res-pill">0 kg = 0 lb</div>
    </div>

</div>

<script>
    function toggleMenu() {
        const s = document.getElementById("proSidebar");
        s.style.width = s.style.width === "250px" ? "0" : "250px";
    }

    function switchTool(tool) {
        document.querySelectorAll('.tool-box').forEach(box => box.classList.remove('active'));
        document.getElementById(tool + '-tool').classList.add('active');
        document.getElementById('mode-title').innerText = tool.toUpperCase() + " PRO";
        toggleMenu();
    }

    async function doCurr() {
        const a = document.getElementById('c-amt').value;
        const f = document.getElementById('c-from').value;
        const t = document.getElementById('c-to').value;
        if(!a) return;
        const r = await fetch(`https://open.er-api.com/v6/latest/${f}`);
        const d = await r.json();
        document.getElementById('c-res').innerText = `${a} ${f} = ${(a * d.rates[t]).toFixed(2)} ${t}`;
    }

    function doMass() {
        const v = parseFloat(document.getElementById('m-val').value) || 0;
        const u = document.getElementById('m-unit').value;
        if(u==='kg') document.getElementById('m-res').innerText = `${v}kg = ${(v*2.204).toFixed(2)}lb`;
        else document.getElementById('m-res').innerText = `${v}lb = ${(v/2.204).toFixed(2)}kg`;
    }
</script>
</body>
</html>
